        /* Background */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            transition: opacity 0.5s;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* ===== PROFILE CARD ===== */
        .profile-card {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        /* Avatar */
        .avatar-wrapper {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
            position: relative;
        }

        .avatar-wrapper.is-owner {
            cursor: pointer;
        }

        .avatar-wrapper.is-owner:hover {
            transform: scale(1.05);
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.3);
        }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        .profile-handle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 16px;
        }

        .profile-icon {
            width: 20px;
            height: 20px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .profile-icon svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
        }

        .welcome-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ===== SOCIAL CARD ===== */
        .social-card {
            width: 100%;
            padding: 18px 14px;
            border-radius: 20px;
            background: rgba(18, 18, 18, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
        }

        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 22%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(.34, 1.56, .64, 1);
            text-decoration: none;
            position: relative;
            overflow: hidden;
            padding: 0;
        }

        .social-btn:hover {
            transform: scale(1.1) translateY(-2px);
        }

        .social-btn svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            position: relative;
            z-index: 1;
        }

        .social-item .social-label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.1px;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .color-row input[type="color"] {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: none;
            cursor: pointer;
            padding: 2px;
            flex-shrink: 0;
        }

        .color-row label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
        }

        /* ===== VISITOR COUNTER ===== */
        .visitor-card {
            width: 100%;
            padding: 14px 18px;
            border-radius: 20px;
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .visitor-icon {
            width: 18px;
            height: 18px;
            opacity: 0.4;
            flex-shrink: 0;
        }

        .visitor-icon svg {
            width: 100%;
            height: 100%;
            fill: #fff;
        }

        .visitor-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .visitor-count {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.75);
        }

        /* ===== EDIT BUTTON (owner only) ===== */
        .edit-float-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(124, 58, 237, 0.85);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        .edit-float-btn:hover {
            transform: scale(1.1);
            background: rgba(124, 58, 237, 1);
        }

        .edit-float-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* ===== SETTINGS ICON (owner only) ===== */
        .settings-icon {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 26px;
            height: 26px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            z-index: 2;
        }

        .settings-icon:hover {
            opacity: 1;
        }

        .settings-icon svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus { border-color: rgba(255, 255, 255, 0.2); }
        .form-input::placeholder { color: rgba(255, 255, 255, 0.2); }
        textarea.form-input { resize: vertical; min-height: 60px; line-height: 1.5; }

        .upload-area {
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover { border-color: rgba(255, 255, 255, 0.25); background: rgba(255, 255, 255, 0.02); }
        .upload-area svg { width: 24px; height: 24px; fill: rgba(255, 255, 255, 0.3); margin-bottom: 6px; }
        .upload-area p { font-size: 11px; color: rgba(255, 255, 255, 0.35); }
        .upload-area input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .preview-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-top: 8px; display: none; }

        .social-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .social-toggle:last-child { border-bottom: none; }
        .social-toggle-label { display: flex; align-items: center; gap: 10px; }
        .social-toggle-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .social-toggle-icon svg { width: 16px; height: 16px; fill: #fff; }
        .social-toggle-name { font-size: 13px; font-weight: 600; }

        .toggle-switch {
            width: 40px; height: 22px; border-radius: 11px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer; position: relative; transition: background 0.3s;
        }
        .toggle-switch.active { background: rgba(124, 58, 237, 0.6); }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 18px; height: 18px; border-radius: 50%;
            background: #fff; transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(18px); }

        .save-btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; margin-top: 16px;
        }
        .save-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3); }

        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 20, 20, 0.95);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        @media (max-width: 420px) {
            body { padding: 30px 14px 50px; }
            .profile-card, .social-card, .visitor-card { padding: 16px; }
        }

        .hidden { display: none !important; }

        /* ===== TWEETS / POSTS SECTION ===== */
        .tweets-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tweet-add-btn {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(124, 58, 237, 0.5);
            border: none; color: #fff;
            font-size: 18px; line-height: 1; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .tweet-add-btn:hover { background: rgba(124, 58, 237, 0.9); transform: scale(1.1); }

        .tweet-card {
            width: 100%;
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            animation: tweetIn 0.4s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes tweetIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tweet-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

        .tweet-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            overflow: hidden; border: 1.5px solid rgba(255, 255, 255, 0.1); flex-shrink: 0;
        }
        .tweet-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .tweet-info .tweet-name { font-size: 13px; font-weight: 700; color: #fff; }
        .tweet-info .tweet-time { font-size: 10px; color: rgba(255, 255, 255, 0.3); margin-top: 1px; }

        .tweet-delete {
            position: absolute; top: 12px; right: 12px;
            width: 22px; height: 22px; border-radius: 6px;
            border: none; background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .tweet-delete:hover { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .tweet-text {
            font-size: 13px; color: rgba(255, 255, 255, 0.8);
            line-height: 1.6; white-space: pre-wrap; word-break: break-word;
        }

        .tweet-media { margin-top: 10px; border-radius: 12px; overflow: hidden; max-height: 380px; }
        .tweet-media img { width: 100%; height: auto; object-fit: cover; display: block; }
        .tweet-media video { width: 100%; border-radius: 12px; display: block; }

        .tweet-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
        }
        .tweet-modal-overlay.active { display: flex; }

        .tweet-modal {
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px 20px 16px 16px;
            padding: 20px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.35s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .tweet-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .tweet-modal-title { font-size: 15px; font-weight: 700; }

        .tweet-textarea {
            width: 100%; min-height: 90px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; color: #fff;
            font-size: 13px; font-family: inherit; padding: 12px;
            resize: none; outline: none; line-height: 1.6;
            margin-bottom: 10px; transition: border-color 0.2s;
        }
        .tweet-textarea:focus { border-color: rgba(124, 58, 237, 0.5); }
        .tweet-textarea::placeholder { color: rgba(255, 255, 255, 0.2); }

        .tweet-media-preview {
            display: none; margin-bottom: 10px;
            border-radius: 12px; overflow: hidden; max-height: 200px;
        }
        .tweet-media-preview img,
        .tweet-media-preview video { width: 100%; object-fit: cover; border-radius: 12px; display: block; }

        .tweet-modal-actions { display: flex; align-items: center; gap: 10px; }

        .tweet-media-btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0; position: relative; overflow: hidden;
        }
        .tweet-media-btn:hover { background: rgba(124, 58, 237, 0.2); border-color: rgba(124, 58, 237, 0.4); color: #a78bfa; }
        .tweet-media-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .tweet-media-btn input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .tweet-post-btn {
            flex: 1; padding: 10px;
            border-radius: 12px; border: none;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            color: #fff; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .tweet-post-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4); }
        .tweet-post-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .no-tweets { text-align: center; padding: 30px; font-size: 13px; color: rgba(255, 255, 255, 0.2); }

        /* Loader */
        .loader {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Owner-only elements: hidden by default, completely removed from DOM rendering for visitors */
        .owner-only {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
        body.is-owner .owner-only {
            display: flex !important;
            visibility: visible !important;
            pointer-events: auto !important;
        }
        body.is-owner .owner-only.inline-block {
            display: inline-block !important;
        }

        /* Owner login modal */
        .login-info {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

    <div class="bg-layer" id="bgLayer"></div>
    <div class="bg-overlay"></div>

    <!-- Main Container -->

                </svg>
            </div>

            <div class="avatar-wrapper" id="avatarWrapper" title="Avatar">
                <div class="avatar-placeholder" id="avatarPlaceholder">✦</div>
                <img id="avatarImg" style="display:none;" alt="avatar">
                <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatar(event)">
            </div>

            <div class="profile-name" id="displayName" style="display:none;"></div>
            <div class="profile-handle" id="displayHandle">@username</div>

            <div class="profile-icon" id="profileIcon" style="display:none;">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
                </svg>
            </div>

            <div class="welcome-text" id="welcomeText">welcome!</div>
        </div>

        <!-- Social Card -->
        <div class="social-card" id="socialCard"></div>

        <!-- Visitor Counter -->
        <div class="visitor-card">
            <div class="visitor-icon">
                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <span class="visitor-text">Profile views</span>
            <span class="visitor-count" id="visitorCount">—</span>
        </div>

        <!-- Posts Section -->
        <div class="tweets-section" id="tweetsSection">
            <div class="owner-only" style="justify-content:flex-end;">
                <button class="tweet-add-btn" id="tweetAddBtn" onclick="openTweetModal()" title="New Post">+</button>
            </div>
            <div id="tweetsList">
                <div id="noTweets" class="no-tweets" style="display:none;">No posts yet ✦</div>
            </div>
        </div>
    </div>

    <!-- Edit floating button (owner only) -->
    <button class="edit-float-btn owner-only" onclick="openModal()" title="Edit Profile">
        <svg viewBox="0 0 24 24">
            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" />
        </svg>
    </button>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">✦ Edit Profile</div>
                <div class="modal-close" onclick="closeModal()">✕</div>
            </div>

            <div class="form-group">
                <label class="form-label">Display Name</label>
                <input class="form-input" id="editName" placeholder="Your name">
            </div>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-input" id="editHandle" placeholder="username">
            </div>

            <div class="form-group">
                <label class="form-label">Welcome Text / Bio</label>
                <textarea class="form-input" id="editWelcome" placeholder="welcome!"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Avatar Image</label>
                <div class="upload-area">
                    <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" /></svg>
                    <p>Click to upload avatar</p>
                    <input type="file" accept="image/*" onchange="handleAvatarModal(event)">
                </div>
                <img class="preview-img" id="avatarPreview">
            </div>

            <div class="form-group">
                <label class="form-label">Background Image</label>
                <div class="upload-area">
                    <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" /></svg>

    // social key -> form prefix
    const SOCIAL_PREFIX = {
        instagram:'ig', tiktok:'tt', twitter:'tw', tellonym:'tl', snapchat:'sc',
        discord:'dc', youtube:'yt', whatsapp:'wa', telegram:'tg'
    };

    // ---------- UTILITIES ----------
    const $ = id => document.getElementById(id);

    function showToast(msg) {
        const toast = $('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    /** Hash a string with SHA-256 (returns hex). */
    async function sha256(text) {
        const enc = new TextEncoder().encode(text);
        const buf = await crypto.subtle.digest('SHA-256', enc);
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    /** Generate a strong random key. */
    function generateOwnerKey() {
        const arr = new Uint8Array(24);
        crypto.getRandomValues(arr);
        return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    /** Resize/compress an image File -> dataURL to keep payloads small. */
    function fileToCompressedDataUrl(file, maxDim = CONFIG.IMAGE_MAX_DIM, quality = CONFIG.IMAGE_QUALITY) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    let { width, height } = img;
                    const ratio = Math.min(1, maxDim / Math.max(width, height));
                    width = Math.round(width * ratio);
                    height = Math.round(height * ratio);
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    /** Format date like the original: "Jan 5 · 10:30 AM" */
    function formatTime(date = new Date()) {
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const h = date.getHours(), m = String(date.getMinutes()).padStart(2,'0');
        return `${months[date.getMonth()]} ${date.getDate()} · ${h%12||12}:${m} ${h>=12?'PM':'AM'}`;
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    /** Linkify URLs in text (returns safe HTML). */
    function linkify(text) {
        const escaped = escapeHtml(text);
        return escaped.replace(/\b(https?:\/\/[^\s<]+)/g, url =>
            `<a href="${url}" target="_blank" rel="noopener" style="color:#a78bfa;text-decoration:none;">${url}</a>`
        );
    }

    /** Normalize a social URL — auto-prepend https:// when needed. */
    function normalizeUrl(url) {
        if (!url) return '';
        url = url.trim();
        if (!url) return '';
        if (/^https?:\/\//i.test(url)) return url;
        if (/^mailto:|^tel:/i.test(url)) return url;
        return 'https://' + url.replace(/^\/+/, '');
    }

    // ---------- API HELPERS ----------
    const API_BASE = '/';

    async function apiGet(path) {
        const r = await fetch(API_BASE + path);
        if (!r.ok && r.status !== 404) throw new Error('GET ' + path + ' ' + r.status);
        return r.status === 404 ? null : r.json();
    }
    async function apiPost(path, body) {
        const r = await fetch(API_BASE + path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (!r.ok) throw new Error('POST ' + path + ' ' + r.status);
        return r.json();
    }
    async function apiPut(path, body) {
        const r = await fetch(API_BASE + path, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (!r.ok) throw new Error('PUT ' + path + ' ' + r.status);
        return r.json();
    }
    async function apiDel(path) {
        const headers = {};
        if (state.ownerKey) headers['x-owner-key'] = state.ownerKey;
        const r = await fetch(API_BASE + path, { method:'DELETE', headers });
        if (!r.ok && r.status !== 204) throw new Error('DELETE ' + path + ' ' + r.status);
    }

    // ---------- OWNER AUTH ----------
    /**
     * Strategy:
     *  1) On first ever load (no profile row exists), the FIRST visitor becomes
     *     the owner: a random key is generated, hashed, and stored.
     *     We also keep the raw key in localStorage so they stay logged in.
     *     They can also save the URL ?owner=KEY to use on other devices.
     *  2) On subsequent loads, owner is detected by comparing localStorage key
     *     (or ?owner= param) hash with the stored ownerHash.
     *  3) Anyone without the matching key is a regular visitor.
     */
    async function authenticateOwner(profile) {
        // Check ?owner= URL param first (used to authorize a NEW device)
        const params = new URLSearchParams(location.search);
        const paramKey = params.get(CONFIG.OWNER_PARAM);
        if (paramKey) {
            const hash = await sha256(paramKey);
            if (profile && profile.ownerHash && hash === profile.ownerHash) {
                // valid key from URL — save locally and clean URL
                localStorage.setItem(CONFIG.OWNER_KEY_LS, paramKey);
                history.replaceState(null, '', location.pathname);
                state.ownerKey = paramKey;
                state.ownerHash = hash;
                state.isOwner = true;
                return;
            } else {
                // invalid key — clean URL silently
                history.replaceState(null, '', location.pathname);
            }
        }

        // Try localStorage key
        const localKey = localStorage.getItem(CONFIG.OWNER_KEY_LS);
        if (localKey && profile && profile.ownerHash) {
            const hash = await sha256(localKey);
            if (hash === profile.ownerHash) {
                state.ownerKey = localKey;
                state.ownerHash = hash;
                state.isOwner = true;
                return;
            } else {
                // stale key, drop it
                localStorage.removeItem(CONFIG.OWNER_KEY_LS);
            }
        }

        state.isOwner = false;
    }

    /** Called when no profile exists yet — claim ownership. */
    async function claimOwnership() {
        const key = generateOwnerKey();
        const hash = await sha256(key);
        localStorage.setItem(CONFIG.OWNER_KEY_LS, key);
        state.ownerKey = key;
        state.ownerHash = hash;
        state.isOwner = true;
        return { key, hash };
    }

    /** Attach owner key to write requests so the server can verify (defense-in-depth). */
    function buildAuthBody(payload) {
        return Object.assign({ _ownerKey: state.ownerKey }, payload);
    }

    /** Client-side guard before any write. */
    function requireOwner() {
        if (!state.isOwner) {
            showToast('Only the owner can do that');
            throw new Error('Not owner');
        }
    }

    // ---------- PROFILE LOAD/SAVE ----------
    async function loadProfile() {
        try {
            const res = await apiGet(`tables/${CONFIG.PROFILE_TABLE}/${CONFIG.PROFILE_ID}`);
            if (res && res.id) {
                state.profile = res;
                // merge socials
                if (res.socials) {
                    try {
                        const parsed = typeof res.socials === 'string' ? JSON.parse(res.socials) : res.socials;
                        Object.keys(parsed || {}).forEach(k => {
                            if (state.socials[k]) {
                                state.socials[k].active = !!parsed[k].active;
                                state.socials[k].url    = parsed[k].url || '';
                            }
                        });
                    } catch (e) {}
                }
                return res;
            }
        } catch (e) { console.warn('loadProfile:', e); }
        return null;
    }

    async function saveProfileToServer() {
        requireOwner();
        const payload = {
            id: CONFIG.PROFILE_ID,
            name: $('displayName').textContent || '',
            handle: ($('displayHandle').textContent || '').replace(/^@/, ''),
            welcome: $('welcomeText').textContent || '',
            avatar: $('avatarImg').src && $('avatarImg').style.display !== 'none' ? $('avatarImg').src : '',
            bgImage: $('bgLayer').style.backgroundImage.replace(/^url\(["']?|["']?\)$/g, '') || '',
            socials: JSON.stringify(
                Object.fromEntries(Object.entries(state.socials).map(([k, v]) => [k, { active: v.active, url: v.url }]))
            ),
            ownerHash: state.ownerHash,
        };

        if (state.profile && state.profile.id) {
            await apiPut(`tables/${CONFIG.PROFILE_TABLE}/${CONFIG.PROFILE_ID}`, buildAuthBody(payload));
        } else {
            await apiPost(`tables/${CONFIG.PROFILE_TABLE}`, buildAuthBody(payload));
            state.profile = payload;
        }
    }

    // ---------- POSTS LOAD/SAVE/DELETE ----------
    async function loadPosts() {
        try {
            const res = await apiGet(`tables/${CONFIG.POSTS_TABLE}?limit=200&sort=timestamp`);
            const data = (res && res.data) || [];
            // newest first
            state.posts = data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        } catch (e) {
            console.warn('loadPosts:', e);
            state.posts = [];
        }
    }

    async function createPost(post) {
        requireOwner();
        const created = await apiPost(`tables/${CONFIG.POSTS_TABLE}`, buildAuthBody(post));
        // ensure id
        if (created && created.id) post.id = created.id;
        return post;
    }

    async function deletePostFromServer(id) {
        requireOwner();
        await apiDel(`tables/${CONFIG.POSTS_TABLE}/${id}`);
    }

    // ---------- VISITS COUNTER ----------
    async function trackVisit() {
        // give every browser a stable session id; only registers once per browser.
        let sid = localStorage.getItem(CONFIG.VISIT_SESSION_LS);
        const isNew = !sid;
        if (!sid) {
            sid = 'v_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
            localStorage.setItem(CONFIG.VISIT_SESSION_LS, sid);
        }

        try {
            if (isNew) {
                // first ever visit from this browser -> register
                await apiPost(`tables/${CONFIG.VISITS_TABLE}`, { id: sid, visitedAt: Date.now() });
            }
        } catch (e) {
            // even if registration fails, still try to read total
            console.warn('trackVisit:', e);
        }

        // total count
        try {
            const res = await apiGet(`tables/${CONFIG.VISITS_TABLE}?limit=1`);
            const total = (res && (typeof res.total === 'number' ? res.total : (res.data ? res.data.length : 0))) || 0;
            animateCount(total);
        } catch (e) {
            console.warn('count read:', e);
            $('visitorCount').textContent = '—';
        }
    }

    function animateCount(target) {
        const el = $('visitorCount');
        const duration = 900;
        const start = performance.now();
        function update(now) {
            const progress = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.floor(target * ease).toLocaleString();
            if (progress < 1) requestAnimationFrame(update);
            else el.textContent = target.toLocaleString();
        }
        requestAnimationFrame(update);
    }

    // ---------- RENDER ----------
    function renderProfile() {
        if (!state.profile) return;
        const p = state.profile;

        if (p.name) {
            $('displayName').textContent = p.name;
            $('displayName').style.display = 'block';
        }
        if (p.handle) {
            $('displayHandle').innerHTML = `<span>@</span>${escapeHtml(p.handle.replace(/^@/, ''))}`;
        }
        if (p.welcome !== undefined && p.welcome !== null) {
            $('welcomeText').textContent = p.welcome;
        }
        if (p.avatar && p.avatar !== 'undefined') {
            $('avatarImg').src = p.avatar;
            $('avatarImg').style.display = 'block';
            $('avatarPlaceholder').style.display = 'none';
        }
        if (p.bgImage && p.bgImage !== 'undefined') {
            $('bgLayer').style.backgroundImage = `url("${p.bgImage}")`;
        }
    }

    function renderSocials() {
        const card = $('socialCard');
        card.innerHTML = '';
        let hasAny = false;

        Object.keys(state.socials).forEach(key => {
            const s = state.socials[key];
            if (!s.active || !s.url) return;
            hasAny = true;

            const item = document.createElement('div');
            item.className = 'social-item';

            const a = document.createElement('a');
            a.className = 'social-btn';
            a.href = normalizeUrl(s.url);
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.title = s.name;
            if (s.img) {
                a.style.background = 'transparent';
                a.style.padding = '0';
                a.style.overflow = 'hidden';
                a.style.borderRadius = '22%';
                const imgEl = document.createElement('img');
                imgEl.src = s.img;
                imgEl.alt = s.name;
                imgEl.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:22%;';
                imgEl.onerror = function() {
                    a.style.background = s.gradient || s.color;
                    imgEl.style.display = 'none';
                    const svgEl2 = document.createElementNS('http://www.w3.org/2000/svg','svg');
                    svgEl2.innerHTML = s.svg.replace(/<svg[^>]*>/,'').replace('</svg>','');
                    svgEl2.setAttribute('viewBox','0 0 24 24');
                    svgEl2.style.cssText = 'width:24px;height:24px;fill:#fff;';
                    a.appendChild(svgEl2);
                };
                a.appendChild(imgEl);
            } else {
                a.style.background = s.gradient || s.color;
                a.innerHTML = s.svg;
                const svgEl = a.querySelector('svg');
                if (svgEl) {
                    svgEl.style.width = '24px';
                    svgEl.style.height = '24px';
                    if (s.iconColor) svgEl.style.fill = s.iconColor;
                    else svgEl.style.fill = '#fff';
                }
            }

            const lbl = document.createElement('span');
            lbl.className = 'social-label';
            lbl.textContent = s.name;

            item.appendChild(a);
            item.appendChild(lbl);
            card.appendChild(item);
        });

        if (!hasAny) {
            card.innerHTML = '<span style="font-size:12px;color:rgba(255,255,255,0.2);">No socials added yet</span>';
        }
    }

    function renderPosts() {
        const list = $('tweetsList');
        const noTweets = $('noTweets');

        if (!state.posts.length) {
            list.innerHTML = '';
            list.appendChild(noTweets);
            noTweets.style.display = 'block';
            return;
        }
        noTweets.style.display = 'none';
        list.innerHTML = '';

        const frag = document.createDocumentFragment();
        state.posts.forEach(tw => {
            const card = document.createElement('div');
            card.className = 'tweet-card';

            const avatarHTML = tw.authorAvatar
                ? `<img src="${escapeHtml(tw.authorAvatar)}" alt="avatar">`
                : `<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,0.3);">✦</div>`;

            let mediaHTML = '';
            if (tw.mediaUrl) {
                mediaHTML = tw.mediaType === 'video'
                    ? `<div class="tweet-media"><video src="${escapeHtml(tw.mediaUrl)}" controls playsinline preload="metadata"></video></div>`
                    : `<div class="tweet-media"><img src="${escapeHtml(tw.mediaUrl)}" alt="media" loading="lazy"></div>`;
            }

            const deleteBtn = state.isOwner
                ? `<button class="tweet-delete" data-id="${escapeHtml(tw.id)}" title="Delete">✕</button>`
                : '';

            card.innerHTML = `
                ${deleteBtn}
                <div class="tweet-top">
                    <div class="tweet-avatar">${avatarHTML}</div>
                    <div class="tweet-info">
                        <div class="tweet-name">${escapeHtml(tw.authorName || '')}</div>
                        <div class="tweet-time">${escapeHtml(tw.time || '')}</div>
                    </div>
                </div>
                ${tw.text ? `<div class="tweet-text">${linkify(tw.text)}</div>` : ''}
                ${mediaHTML}
            `;
            frag.appendChild(card);
        });
        list.appendChild(frag);

        // attach delete handlers (one place, no inline JS)
        list.querySelectorAll('.tweet-delete').forEach(btn => {
            btn.addEventListener('click', () => onDeletePost(btn.dataset.id));
        });
    }

    function applyOwnerVisibility() {
        document.body.classList.toggle('is-owner', state.isOwner);
        $('avatarWrapper').classList.toggle('is-owner', state.isOwner);
        if (state.isOwner) {
            $('avatarWrapper').onclick = () => $('avatarInput').click();
        } else {
            $('avatarWrapper').onclick = null;
            // Visitors: aggressively REMOVE all owner-only elements from the DOM.
            // This guarantees visitors never see the gear icon, edit button, or + post button —
            // even via DOM inspection.
            document.querySelectorAll('.owner-only').forEach(el => el.remove());
            // Also disable the avatar file input so visitors can't even trigger it
            const ai = $('avatarInput'); if (ai) ai.disabled = true;
        }
    }

    // ---------- EVENT HANDLERS ----------
    function openModal() {
        if (!state.isOwner) return;
        $('editModal').classList.add('active');
        document.body.style.overflow = 'hidden';

        $('editName').value = $('displayName').textContent || '';
        $('editHandle').value = ($('displayHandle').textContent || '').replace(/^@/, '');
        $('editWelcome').value = $('welcomeText').textContent || '';

        // social URLs + toggles
        Object.keys(state.socials).forEach(key => {
            const prefix = SOCIAL_PREFIX[key];
            const urlEl = $('edit' + cap(prefix) + 'Url');
            if (urlEl) urlEl.value = state.socials[key].url || '';
            const toggle = $('toggle' + cap(key));
            const grp = $(prefix + 'UrlGroup');
            if (state.socials[key].active) {
                toggle && toggle.classList.add('active');
                grp && (grp.style.display = 'block');
            } else {
                toggle && toggle.classList.remove('active');
                grp && (grp.style.display = 'none');
            }
        });
    }
    function closeModal() {
        $('editModal').classList.remove('active');
        document.body.style.overflow = '';
    }
    function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

    function toggleSocial(key) {
        if (!state.isOwner) return;
        state.socials[key].active = !state.socials[key].active;
        const toggle = $('toggle' + cap(key));
        const prefix = SOCIAL_PREFIX[key];
        const grp = $(prefix + 'UrlGroup');
        if (state.socials[key].active) {
            toggle && toggle.classList.add('active');
            grp && (grp.style.display = 'block');
        } else {
            toggle && toggle.classList.remove('active');
            grp && (grp.style.display = 'none');
        }
    }

    async function handleAvatar(e) {
        if (!state.isOwner) return;
        const file = e.target.files[0];
        if (!file) return;
        try {
            const dataUrl = await fileToCompressedDataUrl(file, 512, 0.85);
            $('avatarImg').src = dataUrl;
            $('avatarImg').style.display = 'block';
            $('avatarPlaceholder').style.display = 'none';
            $('avatarPreview').src = dataUrl;
            $('avatarPreview').style.display = 'block';
            // auto-save just the avatar
            try { await saveProfileToServer(); showToast('Avatar updated'); } catch (e) {}
        } catch (e) { showToast('Image error'); }
    }

    async function handleAvatarModal(e) {
        if (!state.isOwner) return;
        const file = e.target.files[0];
        if (!file) return;
        try {
            const dataUrl = await fileToCompressedDataUrl(file, 512, 0.85);
            $('avatarPreview').src = dataUrl;
            $('avatarPreview').style.display = 'block';
            // also set the visible avatar so it shows on save
            $('avatarImg').src = dataUrl;
            $('avatarImg').style.display = 'block';
            $('avatarPlaceholder').style.display = 'none';
        } catch (e) { showToast('Image error'); }
    }

    async function handleBgModal(e) {
        if (!state.isOwner) return;
        const file = e.target.files[0];
        if (!file) return;
        try {
            const dataUrl = await fileToCompressedDataUrl(file, 1280, 0.78);
            $('bgLayer').style.backgroundImage = `url("${dataUrl}")`;
            $('bgPreview').src = dataUrl;
            $('bgPreview').style.display = 'block';
        } catch (e) { showToast('Image error'); }
    }

    async function saveProfile() {
        if (!state.isOwner) return;
        const btn = $('saveBtn');
        btn.disabled = true;
        const old = btn.textContent;
        btn.innerHTML = '<span class="loader"></span>';

        try {
            const name = $('editName').value.trim();
            const handle = $('editHandle').value.trim().replace(/^@/, '');
            const welcome = $('editWelcome').value.trim();

            if (name) {
                $('displayName').textContent = name;
                $('displayName').style.display = 'block';
            } else {
                $('displayName').textContent = '';
                $('displayName').style.display = 'none';
            }
            $('displayHandle').innerHTML = handle ? `<span>@</span>${escapeHtml(handle)}` : '@username';
            $('welcomeText').textContent = welcome;

            // capture social URLs
            Object.keys(state.socials).forEach(key => {
                const prefix = SOCIAL_PREFIX[key];
                const urlEl = $('edit' + cap(prefix) + 'Url');
                if (urlEl) state.socials[key].url = urlEl.value.trim();
            });

            await saveProfileToServer();
            renderSocials();
            closeModal();
            showToast('Profile saved ✦');
        } catch (e) {
            console.error(e);
            showToast('Save failed');
        } finally {
            btn.disabled = false;
            btn.textContent = old;
        }
    }

    // -------- TWEETS / POSTS --------
    let pendingMedia = null; // { dataUrl, type }

    function openTweetModal() {
        if (!state.isOwner) return;
        $('tweetModal').classList.add('active');
        $('tweetText').value = '';
        pendingMedia = null;
        $('tweetMediaInput').value = '';
        const preview = $('tweetMediaPreview');
        preview.style.display = 'none';
        preview.innerHTML = '';
    }
    function closeTweetModal() {
        $('tweetModal').classList.remove('active');
    }

    async function handleTweetMedia(e) {
        const file = e.target.files[0];
        if (!file) return;
        const isVideo = file.type.startsWith('video');

        if (isVideo) {
            // videos can be huge — keep them small
            if (file.size > 6 * 1024 * 1024) {
                showToast('Video too large (max 6MB)');
                e.target.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = ev => {
                pendingMedia = { dataUrl: ev.target.result, type: 'video' };
                const preview = $('tweetMediaPreview');
                preview.style.display = 'block';
                preview.innerHTML = `<video src="${pendingMedia.dataUrl}" controls playsinline style="width:100%;border-radius:12px;max-height:200px;display:block;"></video>`;
            };
            reader.readAsDataURL(file);
        } else {
            try {
                const dataUrl = await fileToCompressedDataUrl(file, 1280, 0.82);
                pendingMedia = { dataUrl, type: 'image' };
                const preview = $('tweetMediaPreview');
                preview.style.display = 'block';
                preview.innerHTML = `<img src="${dataUrl}" style="width:100%;border-radius:12px;display:block;max-height:200px;object-fit:cover;">`;
            } catch (e) { showToast('Image error'); }
        }
    }

    async function postTweet() {
        if (!state.isOwner) return;
        const text = $('tweetText').value.trim();
        if (!text && !pendingMedia) return;

        const btn = $('postBtn');
        btn.disabled = true;
        const oldText = btn.textContent;
        btn.innerHTML = '<span class="loader"></span>';

        try {
            const post = {
                id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
                text,
                mediaUrl: pendingMedia ? pendingMedia.dataUrl : '',
                mediaType: pendingMedia ? pendingMedia.type : '',
                time: formatTime(),
                timestamp: Date.now(),
                authorName: $('displayName').textContent || ($('displayHandle').textContent || '@username'),
                authorAvatar: ($('avatarImg').style.display !== 'none' ? $('avatarImg').src : ''),
            };

            await createPost(post);
            state.posts.unshift(post);
            renderPosts();
            closeTweetModal();
            showToast('Posted ✦');
        } catch (e) {
            console.error(e);
            showToast('Post failed');
        } finally {
            btn.disabled = false;
            btn.textContent = oldText;
        }
    }

    async function onDeletePost(id) {
        if (!state.isOwner) return;
        if (!confirm('Delete this post?')) return;
        try {
            await deletePostFromServer(id);
            state.posts = state.posts.filter(p => p.id !== id);
            renderPosts();
            showToast('Deleted');
        } catch (e) {
            showToast('Delete failed');
        }
    }

    // expose handlers used by inline onclick
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.toggleSocial = toggleSocial;
    window.handleAvatar = handleAvatar;
    window.handleAvatarModal = handleAvatarModal;
    window.handleBgModal = handleBgModal;
    window.saveProfile = saveProfile;
    window.openTweetModal = openTweetModal;
    window.closeTweetModal = closeTweetModal;
    window.handleTweetMedia = handleTweetMedia;
    window.postTweet = postTweet;

    // Backdrop / esc
    $('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    $('tweetModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeTweetModal(); });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeModal(); closeTweetModal(); }
    });

    // ---------- INIT ----------
    async function init() {
        // load profile, then auth, then render
        const profile = await loadProfile();

        if (!profile) {
            // First ever visit -> claim ownership and create empty profile.
            await claimOwnership();
            try {
                await apiPost(`tables/${CONFIG.PROFILE_TABLE}`, buildAuthBody({
                    id: CONFIG.PROFILE_ID,
                    name: '', handle: '', welcome: 'welcome!',
                    avatar: '', bgImage: '',
                    socials: JSON.stringify({}),
                    ownerHash: state.ownerHash,
                }));
                state.profile = { id: CONFIG.PROFILE_ID };
                showOwnerWelcome();
            } catch (e) { console.warn('init create:', e); }
        } else {
            await authenticateOwner(profile);
        }

        applyOwnerVisibility();
        renderProfile();
        renderSocials();

        // Posts + visits run in parallel for snappy load
        await Promise.all([
            loadPosts().then(renderPosts),
            trackVisit(),
        ]);
    }

    function showOwnerWelcome() {
        // Show owner key once so they can re-login from another device
        const key = state.ownerKey;
        const url = `${location.origin}${location.pathname}?owner=${key}`;
        setTimeout(() => {
            const msg =
`👋 Welcome! You are now the OWNER of this profile.

To edit it from ANOTHER DEVICE, save this private link:

${url}

(Keep it safe — anyone with this link can edit your profile.)`;
            alert(msg);
        }, 400);
    }

    init();
    </script>
</body>
